<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeonVPN</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg"></div>

<header>
<h1>NEONVPN</h1>
<button class="download-btn">Download APK</button>
</header>

<section class="hero">
<div class="badge">⚡ Secure Cyberpunk VPN</div>

<h2>NEXT GEN VPN</h2>

<p>
Ultra fast encrypted connection for gamers,
streamers and creators.
</p>

<div class="buttons">
<button class="connect-btn">CONNECT</button>
<button class="more-btn">Learn More</button>
</div>
</section>

<section class="card-section">
<div class="vpn-card">

<h3>Connection</h3>

<div class="circle">
CONNECT
</div>

<div class="stats">
<div class="stat">
<span>Ping</span>
<h4>12ms</h4>
</div>

<div class="stat">
<span>Speed</span>
<h4>1Gb/s</h4>
</div>
</div>

</div>
</section>

<script src="script.js"></script>
</body>
</html>
