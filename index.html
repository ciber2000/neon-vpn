<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeonVPN</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg"></div>

<header>
<h1>NEONVPN</h1>
<button class="download-btn">Download APK</button>
</header>

<section class="hero">
<div class="badge">⚡ Secure Cyberpunk VPN</div>

<h2>NEXT GEN VPN</h2>

<p>
Ultra fast encrypted connection for gamers,
streamers and creators.
</p>

<div class="buttons">
<button class="connect-btn">CONNECT</button>
<button class="more-btn">Learn More</button>
</div>
</section>

<section class="card-section">
<section class="download-section">

  <div class="download-card">

    <h3>
      DOWNLOAD NEONVPN
    </h3>

    <p>
      Secure ultra-fast VPN for Android
      with futuristic cyberpunk design.
    </p>

    <div class="download-buttons">

      <button class="apk-btn">
        DOWNLOAD APK
      </button>

      <button class="android-btn">
        ANDROID
      </button>

    </div>

    <div class="features">

      <div class="feature">
        <h4>FREE</h4>
        <span>Unlimited access</span>
      </div>

      <div class="feature">
        <h4>FAST</h4>
        <span>Low latency servers</span>
      </div>

      <div class="feature">
        <h4>SECURE</h4>
        <span>Encrypted connection</span>
      </div>

    </div>

  </div>

</section>
</section>

<script src="script.js"></script>
</body>
</html>
